    background-repeat: repeat;
    background-size: 900px 600px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 24px 20px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  /* Header */
  .header .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--azul-claro);
    font-weight: 400;
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 6vw, 36px);
    font-weight: 300;
    color: var(--azul-oscuro);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .header h1 em {
    font-style: italic;
    color: var(--azul);
  }
  .header p {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 300;
    color: var(--azul-claro);
    letter-spacing: 0.02em;
  }

  /* CÍRCULO PRINCIPAL */
  .breath-arena {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Anillos suaves */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--azul-palido);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .ring-1 { width: 260px; height: 260px; opacity: 0.4; animation: pulse-ring 5s ease-in-out infinite; }
  .ring-2 { width: 220px; height: 220px; opacity: 0.5; animation: pulse-ring 5s ease-in-out infinite 1s; }
  .ring-3 { width: 180px; height: 180px; opacity: 0.6; animation: pulse-ring 5s ease-in-out infinite 2s; }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* Círculo respirador */
  .breath-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--blanco);
    border: 1.5px solid var(--azul-palido);
    box-shadow: 0 4px 24px rgba(61,122,138,0.12), 0 0 0 8px rgba(200,223,229,0.2);
    transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    cursor: default;
  }

  .breath-circle.idle {
    animation: idle-breathe 4s ease-in-out infinite;
  }
  @keyframes idle-breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 24px rgba(61,122,138,0.12), 0 0 0 8px rgba(200,223,229,0.2); }
    50% { transform: scale(1.06); box-shadow: 0 8px 32px rgba(61,122,138,0.18), 0 0 0 14px rgba(200,223,229,0.3); }
  }

  .breath-circle.inhale {
    animation: breathe-in var(--dur, 4s) cubic-bezier(0.4, 0, 0.6, 1) forwards;
    border-color: var(--azul);
    box-shadow: 0 8px 40px rgba(61,122,138,0.2), 0 0 0 16px rgba(200,223,229,0.35);
  }
  .breath-circle.hold {
    border-color: var(--azul-claro);
    box-shadow: 0 6px 32px rgba(61,122,138,0.15), 0 0 0 12px rgba(200,223,229,0.25);
  }
  .breath-circle.exhale {
    animation: breathe-out var(--dur, 4s) cubic-bezier(0.4, 0, 0.6, 1) forwards;
    border-color: var(--azul-palido);
    box-shadow: 0 4px 20px rgba(61,122,138,0.1), 0 0 0 6px rgba(200,223,229,0.15);
  }

  @keyframes breathe-in {
    from { transform: scale(1); }
    to { transform: scale(1.5); }
  }
  @keyframes breathe-out {
    from { transform: scale(1.5); }
    to { transform: scale(1); }
  }

  .phase-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--azul-claro);
    font-weight: 400;
  }
  .phase-timer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    color: var(--azul-oscuro);
    line-height: 1;
  }

  /* HUD */
  .hud {
    display: flex;
    align-items: center;
    gap: 36px;
  }
  .hud-stat { text-align: center; }
  .hud-stat .val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    color: var(--azul);
    line-height: 1;
  }
  .hud-stat .lbl {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--azul-claro);
    margin-top: 4px;
    font-weight: 300;
  }
  .hud-sep {
    width: 1px;
    height: 32px;
    background: var(--azul-palido);
  }

  /* Barra de progreso */
  .progress-wrap {
    width: 240px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--azul-claro);
    margin-bottom: 6px;
    font-weight: 300;
  }
  .progress-track {
    width: 100%;
    height: 2px;
    background: var(--azul-niebla);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--azul-palido), var(--azul));
    border-radius: 1px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Botón */
  .btn-start {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blanco);
    background: var(--azul);
    border: none;
    padding: 14px 44px;
    border-radius: 100px;
    cursor: pointer;
    font-weight: 400;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(61,122,138,0.25);
  }
  .btn-start:hover {
    background: var(--azul-oscuro);
    box-shadow: 0 6px 20px rgba(42,90,106,0.3);
  }
  .btn-start:active { transform: scale(0.98); }

  /* Mensaje final */
  .complete-msg {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .complete-msg.visible { display: flex; }
  .complete-msg .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 300;
    font-style: italic;
    color: var(--azul-oscuro);
    letter-spacing: 0.04em;
  }
  .complete-msg .sub {
    font-size: 11px;
    color: var(--azul-claro);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  /* Video */
  .video-wrap {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(61,122,138,0.13);
    background: var(--azul-niebla);
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .video-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 28px;
    text-align: center;
  }
  .video-placeholder .play-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(61,122,138,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-placeholder p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--azul-claro);
    font-weight: 300;
    line-height: 1.5;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--azul-palido);
    margin: 0 auto;
  }

  /* Logo */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--azul-oscuro);
  }
  .logo em { font-style: italic; color: var(--azul); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="yoga-bg"></div>

<div class="container">

  <div class="logo">momento <em>yogui</em></div>

  <!-- VIDEO: reemplazá VIDEO_ID por el ID de tu video de YouTube -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-placeholder" id="videoPlaceholder">
      <div class="play-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" stroke="#3d7a8a" stroke-width="1.5"/>
          <path d="M10 8.5l6 3.5-6 3.5V8.5z" fill="#3d7a8a"/>
        </svg>
      </div>
      <p>El video de José aparecerá<br>aquí cuando esté listo</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="header">
    <div class="eyebrow">Práctica de bienestar</div>
    <h1>Respiración <em>consciente</em></h1>
    <p>Sincronizá tu respiración y encontrá tu centro</p>
  </div>

  <div class="breath-arena">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="breath-circle idle" id="circle">
      <span class="phase-label" id="phaseLabel">listo</span>
      <span class="phase-timer" id="phaseTimer">—</span>
    </div>
  </div>

  <div class="hud">
    <div class="hud-stat">
      <div class="val" id="cycleCount">0</div>
      <div class="lbl">Ciclos</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-stat">
      <div class="val" id="totalTime">0s</div>
      <div class="lbl">Tiempo</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-stat">
      <div class="val" id="remaining">5</div>
      <div class="lbl">Restantes</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>Ciclo actual</span>
      <span id="phaseNameBar">—</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <button class="btn-start" id="btnStart" onclick="startSession()">Comenzar</button>

  <div class="complete-msg" id="completeMsg">
    <div class="big">Práctica completada ✨</div>
    <div class="sub">4·4·4·2 → 5·5·5·3 → 6·6·6·4 · Sistema en equilibrio</div>
  </div>

</div>

<script>
  // === SONIDOS ===
  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  // Pip suave para cada número del conteo
  function pipCount() {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  }

  // Pip más grave al cambiar de fase
  function pipPhase() {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(380, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(320, ctx.currentTime + 0.25);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.38);
  }

  // Para activar el video de YouTube, reemplazá VIDEO_ID:
  // const YOUTUBE_ID = 'VIDEO_ID';
  // const wrap = document.getElementById('videoWrap');
  // wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${YOUTUBE_ID}?rel=0" allowfullscreen></iframe>`;

  const TOTAL = 5;

  // Ciclos progresivos: cada par de ciclos alarga los tiempos
  const CYCLE_DURATIONS = [
    { inhale: 4, hold: 4, exhale: 4, pause: 2 }, // ciclo 1
    { inhale: 4, hold: 4, exhale: 4, pause: 2 }, // ciclo 2
    { inhale: 5, hold: 5, exhale: 5, pause: 3 }, // ciclo 3
    { inhale: 5, hold: 5, exhale: 5, pause: 3 }, // ciclo 4
    { inhale: 6, hold: 6, exhale: 6, pause: 4 }, // ciclo 5
  ];

  function getPhasesForCycle(n) {
    const d = CYCLE_DURATIONS[Math.min(n, TOTAL - 1)];
    return [
      { name: 'Inhalá',  label: 'inhalá',  dur: d.inhale, cls: 'inhale', bar: 0 },
      { name: 'Sostené', label: 'sostené', dur: d.hold,   cls: 'hold',   bar: 33 },
      { name: 'Exhalá',  label: 'exhalá',  dur: d.exhale, cls: 'exhale', bar: 66 },
      { name: 'Pausa',   label: 'pausa',   dur: d.pause,  cls: 'hold',   bar: 88 },
    ];
  }

  let running = false, cyclesDone = 0, totalSec = 0;
  let totalInterval = null, phaseTimeout = null, tickInterval = null;

  const circle = document.getElementById('circle');
  const phaseLabel = document.getElementById('phaseLabel');
  const phaseTimer = document.getElementById('phaseTimer');
  const cycleCount = document.getElementById('cycleCount');
  const totalTime = document.getElementById('totalTime');
  const remaining = document.getElementById('remaining');
  const fill = document.getElementById('progressFill');
  const barName = document.getElementById('phaseNameBar');
  const btn = document.getElementById('btnStart');
  const msg = document.getElementById('completeMsg');

  function startSession() {
    if (running) return;
    running = true; cyclesDone = 0; totalSec = 0;
    btn.style.display = 'none';
    msg.classList.remove('visible');
    remaining.textContent = TOTAL;

    totalInterval = setInterval(() => {
      totalSec++;
      totalTime.textContent = totalSec + 's';
    }, 1000);

    runCycle();
  }

  function runCycle() {
    if (cyclesDone >= TOTAL) { endSession(); return; }
    const phases = getPhasesForCycle(cyclesDone);
    runPhase(0, phases, () => {
      cyclesDone++;
      cycleCount.textContent = cyclesDone;
      remaining.textContent = Math.max(0, TOTAL - cyclesDone) || '✓';
      runCycle();
    });
  }

  function runPhase(idx, phases, done) {
    if (idx >= phases.length) { done(); return; }
    const ph = phases[idx];

    circle.className = 'breath-circle ' + ph.cls;
    circle.style.setProperty('--dur', ph.dur + 's');
    phaseLabel.textContent = ph.label;
    barName.textContent = ph.name;
    fill.style.width = ph.bar + '%';

    pipPhase(); // sonido al cambiar de fase

    let rem = ph.dur;
    phaseTimer.textContent = rem;
    clearInterval(tickInterval);
    tickInterval = setInterval(() => {
      rem--;
      phaseTimer.textContent = rem > 0 ? rem : '';
      if (rem > 0) pipCount(); // pip en cada número
      const next = phases[idx + 1]?.bar ?? 100;
      fill.style.width = (ph.bar + (next - ph.bar) * ((ph.dur - rem) / ph.dur)) + '%';
    }, 1000);

    clearTimeout(phaseTimeout);
    phaseTimeout = setTimeout(() => {
      clearInterval(tickInterval);
      runPhase(idx + 1, phases, done);
    }, ph.dur * 1000);
  }

  function endSession() {
    running = false;
    clearInterval(totalInterval); clearInterval(tickInterval); clearTimeout(phaseTimeout);

    circle.className = 'breath-circle idle';
    phaseLabel.textContent = 'equilibrio';
    phaseTimer.textContent = '✓';
    fill.style.width = '100%';
    barName.textContent = 'Completo';

    msg.classList.add('visible');
    btn.textContent = 'Nueva práctica';
    btn.style.display = '';
    btn.onclick = () => {
      msg.classList.remove('visible');
      cycleCount.textContent = '0';
      totalTime.textContent = '0s';
      remaining.textContent = TOTAL;
      fill.style.width = '0%';
      phaseLabel.textContent = 'listo';
      phaseTimer.textContent = '—';
      barName.textContent = '—';
      circle.className = 'breath-circle idle';
      btn.textContent = 'Comenzar';
      btn.onclick = startSession;
    };
  }
</script>
</body>
</html>
