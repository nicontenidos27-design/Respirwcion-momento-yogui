<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Pranayama Hamsa — La Ciencia del Energismo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:      #C9A84C;
  --gold-dim:  #9B7A2E;
  --gold-pale: rgba(201,168,76,0.10);
  --bg:        #0E0C09;
  --text:      #E8DCC8;
  --muted:     rgba(232,220,200,0.45);
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
#canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
}
.ui {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 44px 24px 48px;
  pointer-events: none;
}
.top-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%; max-width: 460px;
}
.back-btn {
  pointer-events: all;
  background: none;
  border: 1px solid rgba(201,168,76,0.25);
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.2em;
  padding: 7px 14px; border-radius: 2px;
  cursor: pointer; transition: all 0.2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }
.page-title {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.28em;
  color: var(--muted); text-transform: uppercase;
  text-align: center;
}
.page-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 11px;
  color: rgba(201,168,76,0.5);
  letter-spacing: 0.1em; text-align: center;
  margin-top: 3px;
}
.counter-box {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 2px;
}
.counter-num {
  font-family: 'Cinzel', serif;
  font-size: 22px; color: var(--gold); line-height: 1;
}
.counter-label {
  font-family: 'Cinzel', serif;
  font-size: 8px; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase;
}
.mantra-display {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.mantra-word {
  font-family: 'Cinzel', serif;
  font-size: clamp(48px, 14vw, 88px);
  letter-spacing: 0.25em;
  color: var(--gold);
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.25s, transform 0.25s, color 0.25s;
  line-height: 1;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
}
.mantra-word.show {
  opacity: 1; transform: scale(1);
}
.mantra-word.ham { color: #E8C878; text-shadow: 0 0 50px rgba(232,200,120,0.5); }
.mantra-word.sa  { color: #F0F0E0; text-shadow: 0 0 50px rgba(255,255,220,0.9);
  font-size: clamp(36px,10vw,64px); letter-spacing: 0.35em; }
.phase-label {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.3em;
  color: var(--muted); text-transform: uppercase;
  transition: opacity 0.3s; min-height: 16px;
}
.bottom-ui {
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
  width: 100%;
}
.start-btn {
  pointer-events: all;
  background: none;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 0.25em;
  padding: 14px 40px; border-radius: 2px;
  cursor: pointer; transition: all 0.25s;
  text-transform: uppercase;
}
.start-btn:hover { background: var(--gold-pale); border-color: var(--gold); }
.start-btn:active { transform: scale(0.97); }
.start-btn.hidden { opacity: 0; pointer-events: none; }
.hint-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 13px;
  color: var(--muted); text-align: center;
  max-width: 280px; line-height: 1.6;
}
.dots-row {
  display: flex; gap: 10px; align-items: center;
}
.rdot {
  width: 7px; height: 7px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
  transition: all 0.35s;
}
.rdot.done { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 5px rgba(201,168,76,0.5); }
.rdot.active { border-color: var(--gold); animation: rdotPulse 0.9s ease-in-out infinite; }
@keyframes rdotPulse {
  0%,100% { transform:scale(1); opacity:0.5; }
  50% { transform:scale(1.5); opacity:1; }
}
.flash {
  position: fixed; inset: 0;
  background: rgba(255,240,180,0);
  pointer-events: none;
  transition: background 0.12s;
  z-index: 5;
}
.flash.on { background: rgba(255,240,180,0.22); }
.sound-btn {
  pointer-events: all;
  background: none; border: none;
  color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px;
  transition: color 0.2s;
}
.sound-btn:hover { color: var(--gold); }
</style>
</head>

AAARVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVUxBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVX/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAARVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVUxBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVX/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAARVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVUxBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVX/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAARVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVX/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAARVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV <div class="ui">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">← Volver</button>
    <div>
      <div class="page-title">Pranayama Hamsa</div>
      <div class="page-subtitle">Transmutación · HAM — SA</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="counter-box">
        <div class="counter-num" id="cycleNum">0</div>
        <div class="counter-label">Ciclos</div>
      </div>
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
    </div>
  </div>

  <div class="mantra-display">
    <div class="mantra-word" id="mantraWord">HAM</div>
    <div class="phase-label" id="phaseLabel">Preparate</div>
  </div>

  <div class="bottom-ui">
    <div class="dots-row" id="dotsRow"></div>
    <div class="hint-text" id="hintText">HAM al inhalar · SA al exhalar</div>
    <button class="start-btn" id="startBtn" onclick="startPractice()">Comenzar práctica</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const audio  = document.getElementById('mantraAudio');

// ── Config ──
const INHALE_DUR  = 15.0;   // segundos HAM
const PAUSE_DUR   = 0.25;   // pausa entre HAM y SA
const EXHALE_DUR  = 1.5;    // SA corto y fuerte
const SA_START    = 11.0;   // segundo en el audio donde empieza SA
const TOTAL_DOTS  = 9;

let W, H, cx, cy;
let running  = false;
let soundOn  = true;
let phase    = 'idle';
let phaseT   = 0;
let cycles   = 0;
let dotsDone = 0;
let energy   = 0;
let sphereR  = 0;
let targetR  = 0;
let particles = [];
let lastTs   = 0;
let t        = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
window.addEventListener('resize', resize);
resize();

// ── Dots ──
function buildDots() {
  const row = document.getElementById('dotsRow');
  row.innerHTML = '';
  for (let i = 0; i < TOTAL_DOTS; i++) {
    const d = document.createElement('div');
    d.className = 'rdot';
    if (i < dotsDone)                     d.classList.add('done');
    else if (i === dotsDone && running)   d.classList.add('active');
    row.appendChild(d);
  }
}
buildDots();

// ── Sound ──
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  if (!soundOn) audio.pause();
}

function playHAM() {
  if (!soundOn) return;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

function playSA() {
  if (!soundOn) return;
  audio.currentTime = SA_START;
  audio.play().catch(()=>{});
}

// ── Start ──
function startPractice() {
  running = true;
  document.getElementById('startBtn').classList.add('hidden');
  phase = 'inhale'; phaseT = 0;
  showMantra('HAM','ham');
  setLabel('Inhalando · 15s');
  playHAM();
  buildDots();
}

// ── UI helpers ──
function showMantra(word, cls) {
  const el = document.getElementById('mantraWord');
  el.classList.remove('show','ham','sa');
  void el.offsetWidth;
  el.textContent = word;
  el.classList.add('show', cls);
}
function hideMantra() {
  document.getElementById('mantraWord').classList.remove('show','ham','sa');
}
function setLabel(txt) {
  document.getElementById('phaseLabel').textContent = txt;
}
function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'), 140);
}

// ── Particles ──
function spawnBurst(count, speed, type) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = speed*(0.5+Math.random());
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1,
      decay: type==='sa' ? 0.022+Math.random()*0.028 : 0.008+Math.random()*0.01,
      size:  type==='sa' ? 2.5+Math.random()*3.5 : 1+Math.random()*2,
      type
    });
  }
}
function spawnOrbit() {
  const a = Math.random()*Math.PI*2;
  const r = sphereR*(1+Math.random()*0.5);
  particles.push({
    x: cx+Math.cos(a)*r, y: cy+Math.sin(a)*r,
    orbit:true, angle:a, radius:r,
    speed:(0.004+Math.random()*0.006)*(Math.random()>0.5?1:-1),
    life:1, decay:0.005+Math.random()*0.006,
    size:1.2+Math.random()*1.8, type:'orbit'
  });
}

// ── Draw ──
function draw(ts) {
  requestAnimationFrame(draw);
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts; t += dt;

  const base = Math.min(W,H)*0.20;

  if (running) {
    phaseT += dt;

    if (phase === 'inhale') {
      const prog = Math.min(phaseT/INHALE_DUR, 1);
      targetR = base*(0.6 + prog*1.0 + energy*0.3);
      if (Math.random()<0.2) spawnOrbit();
      // update label countdown
      const rem = Math.max(0, INHALE_DUR-phaseT);
      setLabel('Inhalando · ' + rem.toFixed(0) + 's');
      if (phaseT >= INHALE_DUR) {
        phase='pause'; phaseT=0;
        hideMantra(); setLabel('');
        audio.pause();
      }

    } else if (phase === 'pause') {
      targetR = base*(1.6+energy*0.3);
      if (phaseT >= PAUSE_DUR) {
        phase='exhale'; phaseT=0;
        showMantra('SA','sa');
        setLabel('SA');
        spawnBurst(35, 5.5, 'sa');
        doFlash();
        playSA();
        energy = Math.min(1, energy+0.08);
      }

    } else if (phase === 'exhale') {
      const prog = Math.min(phaseT/EXHALE_DUR,1);
      targetR = base*(1.6 - prog*0.95 + energy*0.2);
      if (phaseT >= EXHALE_DUR) {
        // ciclo completo
        cycles++;
        dotsDone = Math.min(dotsDone+1, TOTAL_DOTS);
        document.getElementById('cycleNum').textContent = cycles;
        if (dotsDone >= TOTAL_DOTS) {
          dotsDone=0;
          energy=Math.min(1,energy+0.15);
          spawnBurst(55,7,'sa');
        }
        buildDots();
        phase='inhale'; phaseT=0;
        showMantra('HAM','ham');
        setLabel('Inhalando · 15s');
        playHAM();
      }
    }
  } else {
    targetR = base*(0.75+Math.sin(t*0.7)*0.1);
    if (Math.random()<0.03) spawnOrbit();
  }

  sphereR += (targetR-sphereR)*dt*4.5;

  // ── Clear ──
  ctx.clearRect(0,0,W,H);

  // bg glow
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.6);
  bg.addColorStop(0, `rgba(201,168,76,${0.04+energy*0.09})`);
  bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // rings
  for (let r=0;r<3;r++) {
    const rr=sphereR*(1.5+r*0.5);
    const al=(0.07-r*0.02)*(0.3+energy*0.7);
    const off=Math.sin(t*(0.3+r*0.1)+r*2)*5;
    ctx.beginPath(); ctx.arc(cx,cy,rr+off,0,Math.PI*2);
    ctx.strokeStyle=`rgba(201,168,76,${al})`; ctx.lineWidth=1; ctx.stroke();
  }

  // outer glow
  const og=ctx.createRadialGradient(cx,cy,sphereR*0.3,cx,cy,sphereR*2);
  og.addColorStop(0,`rgba(201,168,76,${0.15+energy*0.2})`);
  og.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,sphereR*2,0,Math.PI*2);
  ctx.fillStyle=og; ctx.fill();

  // core
  const cg=ctx.createRadialGradient(cx-sphereR*0.25,cy-sphereR*0.25,0,cx,cy,sphereR);
  const ca=0.55+energy*0.3;
  cg.addColorStop(0,  `rgba(255,245,190,${ca})`);
  cg.addColorStop(0.35,`rgba(201,168,76,${ca*0.85})`);
  cg.addColorStop(0.75,`rgba(140,100,30,${ca*0.55})`);
  cg.addColorStop(1,  `rgba(60,40,10,${ca*0.15})`);
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();

  // shimmer
  const sh=ctx.createRadialGradient(cx-sphereR*0.3,cy-sphereR*0.3,0,cx-sphereR*0.3,cy-sphereR*0.3,sphereR*0.65);
  sh.addColorStop(0,`rgba(255,255,220,${0.22+Math.sin(t*2.5)*0.08})`);
  sh.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.fillStyle=sh; ctx.fill();

  // edge
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,240,180,${0.3+energy*0.3})`; ctx.lineWidth=1.5; ctx.stroke();

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.life-=p.decay;
    if(p.orbit){
      p.angle+=p.speed; p.radius+=0.2;
      p.x=cx+Math.cos(p.angle)*p.radius;
      p.y=cy+Math.sin(p.angle)*p.radius;
    }else{
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.96; p.vy*=0.96;
    }
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    const al=p.life*0.85;
    if(p.type==='sa')       ctx.fillStyle=`rgba(255,255,220,${al})`;
    else if(p.type==='orbit') ctx.fillStyle=`rgba(201,168,76,${al*0.7})`;
    else                    ctx.fillStyle=`rgba(255,220,120,${al})`;
    ctx.fill();
  });

  // arco progreso inhalación
  if(running && phase==='inhale'){
    const prog=Math.min(phaseT/INHALE_DUR,1);
    ctx.beginPath();
    ctx.arc(cx,cy,sphereR+16,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);
    ctx.strokeStyle='rgba(201,168,76,0.7)'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  }
  if(running && phase==='exhale'){
    const prog=Math.min(phaseT/EXHALE_DUR,1);
    ctx.beginPath();
    ctx.arc(cx,cy,sphereR+16,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-prog));
    ctx.strokeStyle='rgba(200,220,255,0.65)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
  }
}

requestAnimationFrame(draw);
</script>
</body>
</html>
